name: Build Branch Image

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - README.md
      - "**/README.md"
      - docs/**
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  AKMODS_UPSTREAM_REPO: https://github.com/Danathar/akmods.git
  AKMODS_UPSTREAM_REF: 9d13b6950811cdaae2e8ab748c85c5da35810ae3
  IMAGE_NAME: zfs-kinoite-containerfile
  AKMODS_REPO: zfs-kinoite-containerfile-akmods
  DEFAULT_BASE_IMAGE: ghcr.io/ublue-os/kinoite-main:latest
  DEFAULT_BUILD_CONTAINER_IMAGE: ghcr.io/ublue-os/devcontainer:latest
  DEFAULT_BREW_IMAGE: ghcr.io/ublue-os/brew:latest
  DEFAULT_ZFS_MINOR_VERSION: "2.4"

jobs:
  prepare-branch-metadata:
    name: Compute Branch Tag
    runs-on: ubuntu-24.04
    outputs:
      branch_tag: ${{ steps.branch.outputs.branch_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Compute branch-safe image tag prefix
        id: branch
        shell: bash
        run: |
          python3 -m ci_tools.cli compute-branch-metadata

  build-branch-image:
    name: Build Branch Image
    needs: prepare-branch-metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare lowercase registry paths
        shell: bash
        run: |
          echo "IMAGE_ORG=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "IMAGE_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Resolve inputs and verify shared akmods cache
        id: prepare
        shell: bash
        env:
          USE_INPUT_LOCK: false
          LOCK_FILE: ci/inputs.lock.json
          BUILD_CONTAINER_REF: ${{ env.DEFAULT_BUILD_CONTAINER_IMAGE }}
          DEFAULT_BASE_IMAGE: ${{ env.DEFAULT_BASE_IMAGE }}
          DEFAULT_ZFS_MINOR_VERSION: ${{ env.DEFAULT_ZFS_MINOR_VERSION }}
          DEFAULT_AKMODS_REF: ${{ env.AKMODS_UPSTREAM_REF }}
          AKMODS_REPO: ${{ env.AKMODS_REPO }}
        run: |
          python3 -m ci_tools.cli prepare-validation-build

      - name: Compose final branch tag
        id: tags
        shell: bash
        env:
          BRANCH_TAG_PREFIX: ${{ needs.prepare-branch-metadata.outputs.branch_tag }}
          FEDORA_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          echo "branch_image_tag=${BRANCH_TAG_PREFIX}-${FEDORA_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build branch image locally
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.tags.outputs.branch_image_tag }}
          build-args: |
            BASE_IMAGE=${{ steps.prepare.outputs.base_image_pinned }}
            BREW_IMAGE=${{ env.DEFAULT_BREW_IMAGE }}
            AKMODS_IMAGE=ghcr.io/${{ env.IMAGE_ORG }}/${{ env.AKMODS_REPO }}:main-${{ steps.prepare.outputs.version }}
            IMAGE_REPO=ghcr.io/${{ env.IMAGE_ORG }}/${{ env.IMAGE_NAME }}
            SIGNING_KEY_FILENAME=${{ env.IMAGE_NAME }}.pub
          oci: false

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push branch image to GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.tags.outputs.branch_image_tag }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install skopeo and cosign for signature upload
        if: ${{ secrets.SIGNING_SECRET != '' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad
        if: ${{ secrets.SIGNING_SECRET != '' }}
        with:
          cosign-release: v2.6.1

      - name: Sign branch image digest
        if: ${{ secrets.SIGNING_SECRET != '' }}
        shell: bash
        env:
          IMAGE_ORG: ${{ env.IMAGE_ORG }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.tags.outputs.branch_image_tag }}
          REGISTRY_ACTOR: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ github.token }}
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          python3 -m ci_tools.cli sign-image
