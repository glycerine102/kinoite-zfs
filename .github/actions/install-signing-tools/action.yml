name: Install Signing Tools

description: Install skopeo and cosign in Ubuntu runner jobs that need to push or sign images.

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo
    - uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22
      with:
        cosign-release: v2.6.1
