name: Prepare Registry Context

description: Compute normalized GitHub Container Registry (GHCR) paths and whether the current account is an automation bot.

outputs:
  image_org:
    description: Lowercase image-owner portion used in GHCR paths.
    value: ${{ steps.context.outputs.image_org }}
  image_registry:
    description: Base GHCR registry path for the current owner.
    value: ${{ steps.context.outputs.image_registry }}
  actor_is_bot:
    description: Whether the current GitHub account is an automation bot account.
    value: ${{ steps.context.outputs.actor_is_bot }}

runs:
  # This action gathers a few small pieces of registry-related context in one
  # place so the workflow files can stay focused on build logic rather than
  # string formatting.
  using: composite
  steps:
    # GitHub owner names are case-preserving, but GHCR paths are easier to work
    # with in lowercase. The helper also marks bot accounts so branch workflows
    # can avoid publishing throwaway images for automated update branches.
    - id: context
      shell: bash
      run: |
        python3 -m ci_tools.cli export-registry-context
